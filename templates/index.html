<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Travel Agency DB</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: #f0f4f8; padding: 40px; }

    h1 { color: #1F3864; margin-bottom: 30px; }
    h2 { color: #2E75B6; margin-bottom: 15px; }

    .card {
      background: white;
      border-radius: 10px;
      padding: 25px;
      margin-bottom: 30px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      max-width: 600px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 8px 0 15px 0;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 14px;
    }

    button {
      background: #1F3864;
      color: white;
      border: none;
      padding: 10px 25px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
    }
    button:hover { background: #2E75B6; }

    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      max-width: 800px;
    }
    th {
      background: #1F3864;
      color: white;
      padding: 12px 15px;
      text-align: left;
    }
    td { padding: 10px 15px; border-bottom: 1px solid #eee; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #f5f9ff; }

    .empty { color: #999; font-style: italic; padding: 15px; }
  </style>
</head>
<body>

  <h1>✈️ Travel Agency — Database Interface</h1>

  <!-- ADD CUSTOMER FORM -->
  <div class="card">
    <h2>Add New Customer</h2>
    <form action="/add" method="POST">
      <label>ID</label>
      <input type="number" name="person_id" placeholder="" required>

      <label>Full Name</label>
      <input type="text" name="full_name" placeholder="" required>

      <label>Email</label>
      <input type="email" name="email" placeholder="" required>

      <label>Phone Number</label>
      <input type="text" name="phone_number" placeholder="" required>

      <button type="submit"> Add Customer</button>
    </form>
  </div>

  <!-- CUSTOMERS TABLE -->
  <h2 style="margin-bottom:15px; color:#1F3864;"> All Customers</h2>
  <table>
    <tr>
      <th>ID</th>
      <th>Full Name</th>
      <th>Email</th>
      <th>Phone</th>
    </tr>
    {% if customers %}
      {% for c in customers %}
      <tr>
        <td>{{ c[0] }}</td>
        <td>{{ c[1] }}</td>
        <td>{{ c[2] }}</td>
        <td>{{ c[3] }}</td>
      </tr>
      {% endfor %}
    {% else %}
      <tr><td colspan="4" class="empty">No customers yet. Add one above!</td></tr>
    {% endif %}
  </table>

</body>
</html>
